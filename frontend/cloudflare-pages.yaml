# Cloudflare Pages — build reference (mirror these values in the dashboard).
# Dashboard: Workers & Pages → your project → Settings → Builds & deployments
# Docs: https://developers.cloudflare.com/pages/configuration/build-configuration/

version: 1

project:
  name: hackathon-frontend

build:
  # Repository root is the monorepo; only build this app.
  root_directory: frontend
  node_version: "20"
  package_manager: npm
  install_command: npm ci
  # Default Next build (standalone). For Cloudflare’s edge, use OpenNext (see docs/CLOUDFLARE_PAGES.md).
  build_command: npm run build
  # Not used for `output: "standalone"` (Docker/Node host). For static export: out
  output_directory: ""

environment_variables:
  NODE_VERSION: "20"
  # Set in the dashboard (Production / Preview):
  # NEXT_PUBLIC_API_URL — public URL of your Flask API (e.g. https://api.example.com)
  # AUTH0_* — same as local .env.local (never commit secrets)
