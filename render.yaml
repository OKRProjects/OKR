# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Deploy: New → Blueprint → connect repo → apply this file.
#
# Free tier: Web Services + PostgreSQL (limits apply; services may spin down when idle).
# Set secrets in the Render dashboard — do not commit .env.
#
# Env reference: docs/RENDER_ENV.md
# Render injects PORT, RENDER_EXTERNAL_URL per service; DATABASE_URL is linked from Postgres.

version: "1"

databases:
  - name: hackathon-postgres
    databaseName: hackathon
    user: hackathon
    plan: free
    region: oregon

services:
  - type: web
    name: hackathon-backend
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /live
    envVars:
      - key: FLASK_ENV
        value: production
      - key: OKR_REPOSITORY
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: hackathon-postgres
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      # --- Set in dashboard (see docs/RENDER_ENV.md) ---
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
      - key: AUTH0_ISSUER_BASE_URL
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      # Public Next URL (CORS + OAuth redirects). Same as hackathon-frontend RENDER_EXTERNAL_URL.
      - key: FRONTEND_URL
        sync: false
      - key: APP_ADMIN_USER_IDS
        sync: false
      - key: APP_ADMIN_EMAILS
        sync: false

  - type: web
    name: hackathon-frontend
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          name: hackathon-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: AUTH0_SECRET
        sync: false
      - key: AUTH0_ISSUER_BASE_URL
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
